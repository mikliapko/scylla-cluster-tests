bucket: "manager-backup-tests-permanent-snapshots-us-east-1"
cs_read_cmd_template: "cassandra-stress read cl=QUORUM n={num_of_rows} -schema 'keyspace={keyspace_name} replication(strategy=NetworkTopologyStrategy,replication_factor=3) compaction(strategy=LeveledCompactionStrategy)' -mode cql3 native -rate threads=50 -col 'size=FIXED(1024) n=FIXED(1)' -pop seq={sequence_start}..{sequence_end}"
sizes:  # size of backed up dataset in GB
  1:
    tag: "sm_20240807150551UTC"
    number_of_rows: 1073760
    exp_timeout: 1200  # 20 minutes (timeout for restore data operation)
    ks_name: "keyspace1"
    scylla_version: "2024.1.7"
    number_of_nodes: 3
  500:
    tag: "sm_20240807112021UTC"
    number_of_rows: 536880000
    exp_timeout: 18000  # 5 hours
    ks_name: "keyspace1"
    scylla_version: "2024.2.0~rc1-0"
    number_of_nodes: 3
